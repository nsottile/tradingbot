version: "3.9"

services:
  # ---- PostgreSQL ----
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: polymarket_alpha
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis (optional queue / cache) ----
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  # ---- Collector (runs every minute) ----
  collector:
    build: .
    restart: unless-stopped
    command: python scripts/run_collector.py
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/polymarket_alpha
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy

  # ---- Paper trader ----
  paper_trader:
    build: .
    restart: unless-stopped
    command: python scripts/run_paper_trader.py
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/polymarket_alpha
      PAPER_TRADING: "true"
    depends_on:
      db:
        condition: service_healthy

  # ---- Dashboard ----
  dashboard:
    build: .
    restart: unless-stopped
    command: streamlit run polymarket_alpha/dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/polymarket_alpha
    ports:
      - "8501:8501"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
